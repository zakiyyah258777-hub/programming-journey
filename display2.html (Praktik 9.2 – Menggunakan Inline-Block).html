<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Block</title>
        <style>
    .box {
        display: inline-block;
        width: 120px;
        height: 100px;
        background-color: orange;
        margin: 5px;
        text-align: center;
        line-height: 100px;
    }
    </style>
</head>
<body>

<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>

</body>
</html>
