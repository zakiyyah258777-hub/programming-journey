<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box flex-grow - Eksperimen(modifikasi praktik)</title>
        <style>
    .container{
        width: 600px;
        height: 150px;
        border: 5px solid blue;
        margin: 30px;
        padding: 5px;
        display: flex;
        justify-content: baseline;
    }
    .container div{
        background-color: blue;
        margin: 2px;
        /* flex: 1;  <-- nilai awal bisa diubah */
    }
    /* Eksperimen modifikasi: mengubah nilai flex-grow pada masing-masing item */
    .satu { flex: 1; }   /* akan mendapat 1 bagian dari ruang tersisa */
    .dua  { flex: 2; }   /* mendapat 2 bagian  (lebih lebar) */
    .tiga { flex: 1; }   /* 1 bagian */
    .empat{ flex: 3; }   /* 3 bagian  (paling lebar) */
    </style>
</head>
<body>
    <div class="container">
        <div class="satu">1</div>
        <div class="dua">2</div>
        <div class="tiga">3</div>
        <div class="empat">4</div>
    </div>
    <p><strong>Keterangan:</strong> Nilai <code>flex: 1, 2, 1, 3</code>. Item dengan angka lebih besar (2 dan 3) akan mengambil ruang lebih banyak. Coba ubah nilai <code>flex</code> pada masing-masing class untuk melihat perubahannya.</p>
</body>
</html>
