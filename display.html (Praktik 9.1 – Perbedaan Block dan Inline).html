<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Block dan Inline</title>
        <style>
    .block {
        display: block;
        background-color: lightblue;
        margin: 5px;
    }
    .inline {
        display: inline;
        background-color: lightgreen;
        margin: 5px;
    }
    </style>
</head>
<body>

<h2>Contoh Block</h2>
<div class="block">Box 1</div>
<div class="block">Box 2</div>

<h2>Contoh Inline</h2>
<span class="inline">Box A</span>
<span class="inline">Box B</span>

</body>
</html>
